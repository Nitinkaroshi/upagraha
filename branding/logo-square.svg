    <rect x="186" y="0" width="30" height="6"/>
    <rect x="186" y="17" width="30" height="6"/>
    <!-- H -->
    <rect x="224" y="0" width="6" height="39"/>
    <rect x="252" y="0" width="6" height="39"/>
    <rect x="224" y="17" width="34" height="6"/>
    <!-- A -->
    <rect x="266" y="0" width="6" height="39"/>
    <rect x="290" y="0" width="6" height="39"/>
    <rect x="266" y="0" width="30" height="6"/>
    <rect x="266" y="17" width="30" height="6"/>
