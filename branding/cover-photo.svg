  <circle cx="190" cy="210" r="3" fill="#ffffff" opacity="0.8"/>
  <circle cx="415" cy="235" r="2.5" fill="#ffffff" opacity="0.6"/>
  <circle cx="360" cy="190" r="2" fill="#ffffff" opacity="0.5"/>
  <circle cx="240" cy="305" r="2" fill="#ffffff" opacity="0.4"/>
  <circle cx="440" cy="275" r="1.5" fill="#ffffff" opacity="0.3"/>

  <!-- UPAGRAHA - large block letters -->
  <g fill="#ffffff" transform="translate(680, 200)">
