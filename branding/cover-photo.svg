    <rect x="64" y="0" width="40" height="10"/>
    <rect x="64" y="24" width="40" height="10"/>
    <rect x="94" y="0" width="10" height="34"/>
    <!-- A -->
    <rect x="116" y="0" width="10" height="62"/>
    <rect x="152" y="0" width="10" height="62"/>
    <rect x="116" y="0" width="46" height="10"/>
    <rect x="116" y="26" width="46" height="10"/>
    <!-- G -->
    <rect x="174" y="0" width="10" height="62"/>
    <rect x="174" y="0" width="46" height="10"/>
    <rect x="174" y="52" width="46" height="10"/>
    <rect x="210" y="26" width="10" height="36"/>
    <rect x="196" y="26" width="24" height="10"/>
    <!-- R -->
    <rect x="232" y="0" width="10" height="62"/>
    <rect x="232" y="0" width="40" height="10"/>
    <rect x="232" y="24" width="40" height="10"/>
    <rect x="262" y="0" width="10" height="34"/>
    <polygon points="248,34 256,34 272,62 264,62"/>
    <!-- A -->
    <rect x="282" y="0" width="10" height="62"/>
    <rect x="318" y="0" width="10" height="62"/>
    <rect x="282" y="0" width="46" height="10"/>
    <rect x="282" y="26" width="46" height="10"/>
    <!-- H -->
    <rect x="340" y="0" width="10" height="62"/>
    <rect x="382" y="0" width="10" height="62"/>
    <rect x="340" y="26" width="52" height="10"/>
    <!-- A -->
    <rect x="404" y="0" width="10" height="62"/>
    <rect x="440" y="0" width="10" height="62"/>
    <rect x="404" y="0" width="46" height="10"/>
    <rect x="404" y="26" width="46" height="10"/>
