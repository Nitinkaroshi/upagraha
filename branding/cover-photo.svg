<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" width="1500" height="500">
  <rect width="1500" height="500" fill="#000000"/>

  <!-- Stars -->
  <circle cx="50" cy="80" r="1" fill="#ffffff" opacity="0.3"/>
  <circle cx="200" cy="150" r="0.7" fill="#ffffff" opacity="0.2"/>
  <circle cx="400" cy="60" r="0.8" fill="#ffffff" opacity="0.25"/>
  <circle cx="600" cy="120" r="0.7" fill="#ffffff" opacity="0.15"/>
  <circle cx="900" cy="40" r="1" fill="#ffffff" opacity="0.2"/>
  <circle cx="1100" cy="100" r="0.7" fill="#ffffff" opacity="0.3"/>
  <circle cx="1300" cy="70" r="0.8" fill="#ffffff" opacity="0.2"/>
  <circle cx="1400" cy="160" r="0.7" fill="#ffffff" opacity="0.15"/>
  <circle cx="100" cy="350" r="0.7" fill="#ffffff" opacity="0.2"/>
  <circle cx="350" cy="420" r="1" fill="#ffffff" opacity="0.15"/>
