  <ellipse cx="300" cy="250" rx="135" ry="68" fill="none" stroke="#ffffff" stroke-width="0.8" transform="rotate(-55 300 250)" opacity="0.15"/>
  <!-- Center dot -->
  <circle cx="300" cy="250" r="5" fill="#ffffff"/>
