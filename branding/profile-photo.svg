    <rect x="138" y="0" width="4" height="30"/>
    <rect x="156" y="0" width="4" height="30"/>
    <rect x="138" y="0" width="22" height="4"/>
    <rect x="138" y="13" width="22" height="4"/>
    <!-- H -->
    <rect x="166" y="0" width="4" height="30"/>
    <rect x="184" y="0" width="4" height="30"/>
    <rect x="166" y="13" width="22" height="4"/>
    <!-- A -->
    <rect x="194" y="0" width="4" height="30"/>
    <rect x="212" y="0" width="4" height="30"/>
    <rect x="194" y="0" width="22" height="4"/>
    <rect x="194" y="13" width="22" height="4"/>
